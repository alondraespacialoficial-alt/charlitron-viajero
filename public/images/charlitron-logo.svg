<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <circle cx="60" cy="60" r="58" fill="#1a0f08" stroke="#8B6914" stroke-width="2"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#4a2c0a" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Clock marks -->
  <line x1="60" y1="14" x2="60" y2="24" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="96" x2="60" y2="106" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="60" x2="24" y2="60" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <line x1="96" y1="60" x2="106" y2="60" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour and minute hands -->
  <line x1="60" y1="60" x2="60" y2="30" stroke="#D4A760" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="82" y2="60" stroke="#D4A760" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="4" fill="#D4A760"/>
  <!-- Letter C -->
  <text x="60" y="76" text-anchor="middle" fill="#D4A760" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" opacity="0.9">C</text>
</svg>
